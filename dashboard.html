<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClearRank | Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
</head>

<body class="bg-slate-50 text-slate-900 font-sans antialiased h-screen flex overflow-hidden">

    <div id="mobile-backdrop" class="fixed inset-0 bg-slate-900/80 z-20 hidden md:hidden transition-opacity"></div>

    <aside id="sidebar"
        class="w-64 bg-slate-900 text-slate-300 flex flex-col fixed inset-y-0 left-0 z-30 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 ease-in-out h-full border-r border-slate-800">
        <div class="h-16 flex items-center px-6 border-b border-slate-800 bg-slate-900/50">
            <a href="index.html" class="text-xl font-bold tracking-tight text-white flex items-center gap-2">
                <svg class="w-6 h-6 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                </svg>
                ClearRank
            </a>
            <button id="close-sidebar" class="ml-auto md:hidden text-slate-400 hover:text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <a href="#"
                class="flex items-center gap-3 px-3 py-2.5 bg-indigo-600/10 text-indigo-400 rounded-lg font-medium transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z">
                    </path>
                </svg>
                Overview
            </a>
            <a href="#"
                class="flex items-center gap-3 px-3 py-2.5 hover:bg-slate-800 hover:text-white rounded-lg font-medium transition-colors">
                <svg class="w-5 h-5 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                    </path>
                </svg>
                Cannibalization Alerts
            </a>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col h-full overflow-hidden relative w-full bg-slate-50">
        <header
            class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 md:px-8 z-10 flex-shrink-0">
            <div class="flex items-center gap-4">
                <button id="open-sidebar" class="md:hidden text-slate-500 hover:text-slate-900 focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
                <div class="relative hidden sm:block">
                    <select id="gsc-sites-dropdown"
                        class="appearance-none bg-slate-50 border border-slate-200 text-slate-700 py-1.5 pl-3 pr-8 rounded-md text-sm font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 cursor-pointer shadow-sm">
                        <option>Loading sites...</option>
                    </select>
                </div>
            </div>
            <div class="flex items-center gap-4 md:gap-6">
                <div class="hidden md:flex items-center gap-2">
                    <span class="relative flex h-2 w-2">
                        <span
                            class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    <span class="text-xs font-medium text-slate-600">GSC Connected</span>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-x-hidden overflow-y-auto p-4 md:p-8">
            <div class="max-w-7xl mx-auto space-y-8">

                <div
                    class="mb-8 p-6 bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div>
                        <h3 class="text-lg font-bold text-slate-900">Run Deep Intent Audit</h3>
                        <p class="text-sm text-slate-500">Pass keywords to the Gemini Engine to find cannibalization.
                        </p>
                    </div>
                    <button id="testEngineBtn"
                        class="bg-indigo-600 text-white px-5 py-2.5 rounded-lg text-sm font-bold hover:bg-indigo-700 transition shadow-sm whitespace-nowrap">
                        Analyze Keywords Now
                    </button>
                </div>

                <div class="space-y-4">
                    <h2 class="text-lg font-bold text-slate-900">Priority Keyword Conflicts</h2>

                    <div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="min-w-full divide-y divide-slate-200 text-left">
                                <thead class="bg-slate-50">
                                    <tr>
                                        <th scope="col"
                                            class="px-6 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">
                                            Intent Cluster</th>
                                        <th scope="col"
                                            class="px-6 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">
                                            Conflicting URLs</th>
                                        <th scope="col"
                                            class="px-6 py-3 text-right text-xs font-semibold text-slate-500 uppercase tracking-wider w-[260px]">
                                            Action</th>
                                    </tr>
                                </thead>
                                <tbody id="conflicts-table-body" class="bg-white divide-y divide-slate-200">
                                    <tr>
                                        <td colspan="3" class="px-6 py-12 text-center text-slate-500 text-sm">
                                            Click "Analyze Keywords Now" to generate your first audit.
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ==========================================
            // 1. POPULATE GSC SITES ON LOAD
            // ==========================================
            async function fetchUserSites() {
                const siteDropdown = document.getElementById('gsc-sites-dropdown');

                try {
                    const response = await fetch('/api/gsc/sites');

                    // Security Bounce: If they aren't logged in, redirect to the landing page
                    if (response.status === 401) {
                        window.location.href = '/';
                        return;
                    }

                    const result = await response.json();

                    if (result.status === 'success') {
                        siteDropdown.innerHTML = ''; // Clear loading text

                        // Handle the Empty State gracefully
                        if (!result.sites || result.sites.length === 0) {
                            siteDropdown.innerHTML = '<option disabled>No connected sites found</option>';
                            return;
                        }

                        // Populate the dropdown with real domains
                        result.sites.forEach(site => {
                            const option = document.createElement('option');
                            option.value = site.siteUrl;
                            // Make the URL pretty (remove https:// and trailing slashes)
                            option.textContent = site.siteUrl.replace(/^(https?:\/\/)/, '').replace(/\/$/, '');
                            siteDropdown.appendChild(option);
                        });
                    } else {
                        throw new Error("Failed to load sites.");
                    }
                } catch (error) {
                    console.error("Site fetch error:", error);
                    siteDropdown.innerHTML = '<option disabled>Error loading properties</option>';
                }
            }

            fetchUserSites();

            // ==========================================
            // 2. SIDEBAR TOGGLE
            // ==========================================
            const sidebar = document.getElementById('sidebar');
            const openBtn = document.getElementById('open-sidebar');
            const closeBtn = document.getElementById('close-sidebar');
            const backdrop = document.getElementById('mobile-backdrop');

            function toggleSidebar() {
                sidebar.classList.toggle('-translate-x-full');
                backdrop.classList.toggle('hidden');
            }

            openBtn.addEventListener('click', toggleSidebar);
            closeBtn.addEventListener('click', toggleSidebar);
            backdrop.addEventListener('click', toggleSidebar);

            // ==========================================
            // 3. LIVE DATA FETCHING LOGIC (AI)
            // ==========================================
            const analyzeBtn = document.getElementById('testEngineBtn');
            const tableBody = document.getElementById('conflicts-table-body');

            analyzeBtn.addEventListener('click', async () => {
                analyzeBtn.innerText = "Analyzing Intent...";
                analyzeBtn.disabled = true;
                analyzeBtn.classList.add('opacity-50', 'cursor-not-allowed');

                tableBody.innerHTML = `
                    <tr>
                        <td colspan="3" class="px-6 py-12 text-center text-slate-500 text-sm">
                            <div class="flex justify-center items-center gap-2">
                                <svg class="animate-spin h-5 w-5 text-indigo-600" fill="none" viewBox="0 0 24 24">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                </svg>
                                Gemini is clustering your data...
                            </div>
                        </td>
                    </tr>
                `;

                try {
                    // Grab the exact website the user selected in the header dropdown
                    const selectedSite = document.getElementById('gsc-sites-dropdown').value;

                    const response = await fetch('/api/analyze-intent', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ siteUrl: selectedSite }) // Send the site URL to the backend
                    });

                    const result = await response.json();

                    if (result.status === 'success') {
                        tableBody.innerHTML = '';

                        const clusters = result.data;
                        if (!clusters || clusters.length === 0) {
                            tableBody.innerHTML = `<tr><td colspan="3" class="px-6 py-8 text-center text-slate-500">No cannibalization found!</td></tr>`;
                            return;
                        }

                        clusters.forEach((cluster) => {
                            const losingUrlsHtml = cluster.losing_urls.map(url => `
                                <div class="flex items-center gap-2 mt-2">
                                    <span class="w-2 h-2 rounded-full bg-rose-500"></span>
                                    <a href="${url}" target="_blank" class="text-sm font-mono text-rose-700 hover:underline truncate max-w-[250px] inline-block" title="${url}">
                                        ${url.replace('https://example.com', '')}
                                    </a>
                                    <span class="text-xs text-slate-400 ml-2">(Loser)</span>
                                </div>
                            `).join('');

                            const rowHTML = `
                                <tr class="transition-all duration-300 ease-in-out hover:bg-slate-50">
                                    <td class="px-6 py-5 align-top">
                                        <div class="text-sm font-bold text-slate-900">${cluster.intent_name}</div>
                                        <div class="text-xs text-slate-500 mt-1">Total Search Vol: ${cluster.total_search_volume.toLocaleString()}</div>
                                    </td>
                                    <td class="px-6 py-5 align-top">
                                        <div class="space-y-1">
                                            <div class="flex items-center gap-2">
                                                <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                                                <a href="${cluster.winning_url}" target="_blank" class="text-sm font-mono text-emerald-700 hover:underline font-bold truncate max-w-[250px] inline-block" title="${cluster.winning_url}">
                                                    ${cluster.winning_url.replace('https://example.com', '')}
                                                </a>
                                                <span class="text-xs text-emerald-600 font-medium ml-2 border border-emerald-200 bg-emerald-50 px-2 py-0.5 rounded-full">Canonical (Keep)</span>
                                            </div>
                                            ${losingUrlsHtml}
                                        </div>
                                    </td>
                                    <td class="px-6 py-5 align-top text-right">
                                        <button class="resolve-btn whitespace-nowrap px-4 py-2 border border-transparent text-white text-sm font-medium rounded-lg bg-indigo-600 hover:bg-indigo-700 focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors shadow-sm w-full text-center">
                                            ${cluster.recommended_action || 'Resolve via 301'}
                                        </button>
                                    </td>
                                </tr>
                            `;
                            tableBody.insertAdjacentHTML('beforeend', rowHTML);
                        });
                    } else {
                        throw new Error(result.message);
                    }

                } catch (error) {
                    tableBody.innerHTML = `<tr><td colspan="3" class="px-6 py-8 text-center text-rose-500 font-medium">Failed to load data: ${error.message}</td></tr>`;
                } finally {
                    analyzeBtn.innerText = "Analyze Keywords Now";
                    analyzeBtn.disabled = false;
                    analyzeBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                }
            });

            // ==========================================
            // 4. EVENT DELEGATION FOR DYNAMIC BUTTONS
            // ==========================================
            tableBody.addEventListener('click', (e) => {
                const resolveBtn = e.target.closest('.resolve-btn');

                if (resolveBtn) {
                    resolveBtn.disabled = true;
                    resolveBtn.classList.remove('bg-indigo-600', 'hover:bg-indigo-700');
                    resolveBtn.classList.add('bg-emerald-500');

                    resolveBtn.innerHTML = `
                        <span class="flex items-center justify-center gap-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                            Resolved
                        </span>
                    `;

                    resolveBtn.closest('tr').classList.add('opacity-50', 'bg-slate-50/50');
                }
            });
        });
    </script>
</body>

</html>
